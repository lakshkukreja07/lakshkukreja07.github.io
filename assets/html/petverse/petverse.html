<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Universal viewport for all displays -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PETVERSE</title>

<style>
/* ================= UNIVERSAL RESET ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width: 100%;
  height: 100%;
  overflow-x: hidden;
  position: relative;
}

body {
  background: #f2f2f2;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow-x: hidden;
  /* Universal scaling base */
  font-size: 16px;
}

/* ================= SCALING CONTAINER ================= */
.scaling-container {
  width: 100%;
  height: 100%;
  position: relative;
  /* Base scaling unit */
  --scale-unit: min(1vw, 1vh);
  --safe-area-top: env(safe-area-inset-top, 0px);
}

/* ================= TOPBAR - UNIVERSAL SCALING ================= */
.topbar {
  position: fixed;
  top: max(25px, calc(25px + var(--safe-area-top)));
  left: 50%;
  transform: translateX(-50%);
  /* Use min() and max() for consistent sizing */
  width: min(1200px, 80%);
  /* Scale height with viewport */
  height: clamp(55px, 6.5vh, 65px);
  background: white;
  border-radius: 100px;
  /* Responsive padding */
  padding: 0 clamp(20px, 4vw, 40px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  z-index: 1000;
  /* Animation */
  opacity: 0;
  transform: translateX(-50%) translateY(-100%);
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.loaded .topbar {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.logo {
  font-family: 'ClashDisplay-Bold';
  /* Scale font size with viewport */
  font-size: clamp(18px, 2.2vw, 22px);
  letter-spacing: 1px;
  white-space: nowrap;
}

.nav-links {
  display: flex;
  gap: clamp(20px, 3.5vw, 35px);
}

.nav-links a {
  text-decoration: none;
  color: #444;
  font-size: clamp(12px, 1.4vw, 14px);
  font-family: 'ClashDisplay-Regular';
  white-space: nowrap;
}

.cta-btn {
  background: black;
  color: white;
  padding: clamp(8px, 1vh, 10px) clamp(18px, 2.2vw, 22px);
  border-radius: 100px;
  border: none;
  font-size: clamp(12px, 1.4vw, 14px);
  cursor: pointer;
  font-family: 'ClashDisplay-Regular';
  white-space: nowrap;
}

/* ================= HERO SECTION - UNIVERSAL SCALING ================= */
.hero {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  background-color: #F4EED7;
  overflow: hidden;
  /* Dynamic padding based on topbar */
  padding-top: clamp(120px, 15vh, 160px);
  padding-bottom: clamp(40px, 5vh, 60px);
  justify-content: space-between;
}

/* Paw Background - Scale with screen */
.hero::before {
  content: "";
  position: absolute;
  inset: -50%;
  background-image: url('https://cdn.jsdelivr.net/gh/lakshkukreja07/lakshkukreja07.github.io/assets/src/background-paw.png');
  background-repeat: repeat;
  /* Scale paw size with viewport */
  background-size: clamp(300px, 40vw, 480px) clamp(300px, 40vw, 480px);
  transform: rotate(20deg);
  opacity: 0.05;
  animation: movePaws 40s linear infinite;
  z-index: 0;
}

@keyframes movePaws {
  from { background-position: 0 0; }
  to { background-position: 0 -1500px; }
}

/* ================= HERO CONTENT - RESPONSIVE TEXT ================= */
.hero-content {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: min(1200px, 90vw);
  padding: 0 clamp(20px, 5vw, 40px);
  opacity: 0;
  transform: translateY(-50px);
  transition: all 0.9s cubic-bezier(0.4, 0, 0.2, 1);
}

.loaded .hero-content {
  opacity: 1;
  transform: translateY(0);
  transition-delay: 0.3s;
}

.hero-content h1 {
  /* Responsive font scaling */
  font-size: clamp(36px, 8vw, 72px);
  margin-bottom: clamp(5px, 1vh, 15px);
  line-height: 1.1;
}

.black-text {
  font-family: 'ClashGrotesk-SemiBold';
  color: #000;
  letter-spacing: clamp(0.5px, 0.1vw, 1px);
}

.orange-text {
  font-family: 'ClashGrotesk-Bold';
  letter-spacing: clamp(1px, 0.15vw, 1.5px);
  background: linear-gradient(90deg, #FF4F1A, #FF7A3D, #FF4F1A);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 3s linear infinite;
}

@keyframes shimmer {
  to { background-position: 200% center; }
}

/* ================= CAT CONTAINER - UNIVERSAL POSITIONING ================= */
.cat-container {
  position: relative;
  z-index: 5;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  width: 100%;
  height: 50vh;
  min-height: 300px;
  max-height: 600px;
  opacity: 0;
  transform: translateY(50px);
  transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
}

.loaded .cat-container {
  opacity: 1;
  transform: translateY(0);
  transition-delay: 0.6s;
}

.cat-container img {
  /* Dynamic image sizing */
  width: auto;
  height: auto;
  max-width: min(700px, 90vw);
  max-height: min(500px, 50vh);
  /* Position at bottom of container */
  object-fit: contain;
  object-position: center bottom;
  /* Subtle shadow for depth */
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
}

/* ================= NEXT SECTION ================= */
.next-section {
  position: relative;
  background: white;
  height: clamp(300px, 40vh, 400px);
  width: 100%;
  z-index: 1;
  margin-top: -5vh;
  border-top-left-radius: 40px;
  border-top-right-radius: 40px;
  box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
}

/* ================= MOBILE VERSION ================= */
.mobile-menu-btn {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 10px;
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 1001;
}

.hamburger {
  display: block;
  width: 24px;
  height: 2px;
  background: #000;
  position: relative;
  transition: all 0.3s ease;
}

.hamburger::before,
.hamburger::after {
  content: '';
  position: absolute;
  width: 24px;
  height: 2px;
  background: #000;
  left: 0;
  transition: all 0.3s ease;
}

.hamburger::before {
  top: -8px;
}

.hamburger::after {
  top: 8px;
}

.mobile-menu {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: white;
  z-index: 999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px 20px 40px;
}

@media (max-width: 768px) {
  /* Topbar mobile */
  .topbar {
    width: 92%;
    height: clamp(50px, 7vh, 60px);
    padding: 0 15px;
  }
  
  .logo {
    font-size: clamp(16px, 4vw, 20px);
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
  
  /* Hide desktop elements */
  .nav-links,
  .cta-btn {
    display: none !important;
  }
  
  /* Show mobile menu button */
  .mobile-menu-btn {
    display: block;
    left: 15px;
  }
  
  /* Hero adjustments */
  .hero {
    padding-top: clamp(100px, 20vh, 140px);
  }
  
  .hero-content h1 {
    font-size: clamp(28px, 10vw, 42px);
  }
  
  .cat-container {
    height: 40vh;
    min-height: 250px;
  }
  
  .cat-container img {
    max-width: 85vw;
    max-height: 35vh;
  }
}

/* ================= UNIVERSAL DISPLAY FIXES ================= */
/* Fix for high DPI displays (4K, retina) */
@media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
  .hero::before {
    opacity: 0.04;
  }
  
  .cat-container img {
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
  }
}

/* Fix for very wide screens (ultrawide) */
@media (min-aspect-ratio: 21/9) {
  .hero::before {
    background-size: clamp(400px, 30vw, 600px) clamp(400px, 30vw, 600px);
  }
  
  .hero-content h1 {
    font-size: clamp(48px, 5vw, 64px);
  }
}

/* Fix for very tall screens (portrait) */
@media (max-aspect-ratio: 3/4) {
  .hero {
    padding-top: clamp(80px, 25vh, 120px);
    padding-bottom: 20px;
  }
  
  .hero-content h1 {
    font-size: clamp(24px, 6vw, 36px);
  }
  
  .cat-container {
    height: 35vh;
  }
}

/* Screenshare-specific fixes */
@media (min-width: 1921px) {
  /* When screensharing to 4K TV */
  body {
    zoom: 1;
    transform: scale(1);
  }
  
  .hero::before {
    background-size: 550px 550px;
  }
}

/* Prevent Safari/Chrome text size adjustments */
@media screen and (-webkit-min-device-pixel-ratio: 0) {
  .hero-content h1 {
    -webkit-text-size-adjust: none;
  }
}
</style>
</head>

<body>
<div class="scaling-container">
  
  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <div class="mobile-nav-links">
      <a href="#">Home</a>
      <a href="#">Services</a>
      <a href="#">Pricing</a>
      <a href="#">Contact</a>
    </div>
    <button class="mobile-cta-btn">Sign In</button>
  </div>
  
  <!-- Topbar -->
  <div class="topbar">
    <button class="mobile-menu-btn" id="mobileMenuBtn">
      <span class="hamburger"></span>
    </button>
    <div class="logo">PETVERSE</div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Services</a>
      <a href="#">Pricing</a>
      <a href="#">Contact</a>
    </div>
    <button class="cta-btn">Sign In</button>
  </div>
  
  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>
        <span class="black-text">FOR THE</span>
        <span class="orange-text">PET LOVERS.</span>
      </h1>
    </div>
    <div class="cat-container">
      <img src="https://cdn.jsdelivr.net/gh/lakshkukreja07/lakshkukreja07.github.io/assets/src/cat.png" alt="Petverse Cat">
    </div>
  </section>
  
  <section class="next-section"></section>
</div>

<script>
// Universal scaling function
function applyUniversalScaling() {
  const container = document.querySelector('.scaling-container');
  const catContainer = document.querySelector('.cat-container');
  const heroSection = document.querySelector('.hero');
  
  if (!container || !catContainer || !heroSection) return;
  
  // Get viewport dimensions
  const vw = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0);
  const vh = Math.max(document.documentElement.clientHeight || 0, window.innerHeight || 0);
  const aspectRatio = vw / vh;
  
  // Adjust cat size based on aspect ratio
  if (aspectRatio > 2) {
    // Very wide screen (ultrawide)
    catContainer.style.maxHeight = '45vh';
    catContainer.style.alignItems = 'center';
  } else if (aspectRatio < 0.8) {
    // Tall screen (portrait)
    catContainer.style.height = '35vh';
    catContainer.style.minHeight = '200px';
  } else {
    // Normal screen
    catContainer.style.height = '50vh';
  }
  
  // Check if screensharing (high resolution)
  const isHighDPI = window.devicePixelRatio > 1.5;
  const isLargeScreen = vw > 2560;
  
  if (isHighDPI || isLargeScreen) {
    // Apply screenshare optimizations
    document.documentElement.style.setProperty('--scale-unit', '1px');
    
    // Fix cat position for 4K
    catContainer.style.maxHeight = '55vh';
    catContainer.querySelector('img').style.maxWidth = 'min(800px, 80vw)';
  }
}

// Load animation
window.addEventListener('load', function() {
  document.body.classList.add('loaded');
  applyUniversalScaling();
  
  // Force initial layout
  setTimeout(applyUniversalScaling, 100);
});

// Mobile menu functionality
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
const mobileMenu = document.getElementById('mobileMenu');

if (mobileMenuBtn && mobileMenu) {
  mobileMenuBtn.addEventListener('click', function() {
    this.classList.toggle('active');
    mobileMenu.classList.toggle('active');
  });
  
  const mobileLinks = mobileMenu.querySelectorAll('a');
  mobileLinks.forEach(link => {
    link.addEventListener('click', () => {
      mobileMenuBtn.classList.remove('active');
      mobileMenu.classList.remove('active');
    });
  });
}

// Dynamic scaling on resize
let resizeTimeout;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(applyUniversalScaling, 150);
});

// Handle screenshare display changes
if (window.matchMedia) {
  const mediaQuery = window.matchMedia('(min-resolution: 192dpi)');
  mediaQuery.addEventListener('change', applyUniversalScaling);
}

// Fix for MacOS screenshare
document.addEventListener('DOMContentLoaded', function() {
  // Apply scaling immediately
  applyUniversalScaling();
  
  // Lock viewport scaling
  document.documentElement.style.zoom = '1';
  document.body.style.zoom = '1';
  document.body.style.transform = 'scale(1)';
  
  // Prevent any browser zoom
  document.addEventListener('wheel', function(e) {
    if (e.ctrlKey) {
      e.preventDefault();
      return false;
    }
  }, { passive: false });
});

// Detect if actually in screenshare mode
function detectScreenshare() {
  const isLikelyScreenshare = 
    window.outerWidth !== window.innerWidth || // Browser windowed
    window.screenTop < 0 || // Window might be offscreen
    window.screenLeft < 0;
  
  if (isLikelyScreenshare) {
    console.log('Screenshare mode detected - applying universal scaling');
    document.body.classList.add('screenshare-mode');
  }
}

// Run detection after a short delay
setTimeout(detectScreenshare, 1000);
</script>

</body>
</html>
